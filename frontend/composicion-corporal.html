<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGRENE - Composición Corporal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">SIGRENE</a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="entrenamiento.html" class="nav-link">Registrar</a>
                <a href="nadadores.html" class="nav-link">Nadadores</a>
                <a href="control-fisiologico.html" class="nav-link">Controles</a>
                <a href="composicion-corporal.html" class="nav-link active">Composición</a>
                <a href="analisis-competicion.html" class="nav-link">Competición</a>
            </nav>
            <div class="user-menu">
                <span class="user-name" id="user-name">Usuario</span>
                <button class="btn btn-danger btn-sm" id="logout-btn">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container container-md">
            <h1 class="page-title">Composición Corporal</h1>
            
            <div id="alert-container"></div>
            
            <div class="card">
                <form id="composicion-form">
                    <input type="hidden" id="edit-id" value="">
                    
                    <h3 class="mb-2">Datos generales</h3>
                    
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="nadador_id">Nadador</label>
                            <select id="nadador_id" name="nadador_id" class="form-control" required>
                                <option value="">Seleccionar nadador...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" name="fecha" class="form-control" required>
                        </div>
                    </div>
                    
                    <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                    
                    <h3 class="mb-2">Medidas Morfológicas Básicas</h3>
                    
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="altura_cm">Altura (cm)</label>
                            <input type="number" id="altura_cm" name="altura_cm" class="form-control" 
                                   placeholder="175" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="peso_kg">Peso (kg)</label>
                            <input type="number" id="peso_kg" name="peso_kg" class="form-control" 
                                   placeholder="70" step="0.1">
                        </div>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="altura_sentado_cm">Altura sentado (cm)</label>
                            <input type="number" id="altura_sentado_cm" name="altura_sentado_cm" class="form-control" 
                                   placeholder="90" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="envergadura_cm">Envergadura (cm)</label>
                            <input type="number" id="envergadura_cm" name="envergadura_cm" class="form-control" 
                                   placeholder="180" step="0.1">
                        </div>
                    </div>

                    <div class="grid grid-3">
                        <div class="form-group">
                            <label for="longitud_pie_cm">Longitud pie (cm)</label>
                            <input type="number" id="longitud_pie_cm" name="longitud_pie_cm" class="form-control" 
                                   placeholder="27" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="longitud_mano_cm">Longitud mano (cm)</label>
                            <input type="number" id="longitud_mano_cm" name="longitud_mano_cm" class="form-control" 
                                   placeholder="20" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="distancia_biacromial_cm">Distancia biacromial (cm)</label>
                            <input type="number" id="distancia_biacromial_cm" name="distancia_biacromial_cm" class="form-control" 
                                   placeholder="40" step="0.1">
                        </div>
                    </div>

                    <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                    
                    <h3 class="mb-2">Bioimpedancia (Opcional)</h3>
                    <p class="mb-2" style="color: var(--text-secondary); font-size: 0.875rem;">
                        Requiere balanza de bioimpedancia. Realizar en ayunas.
                    </p>
                    
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="masa_muscular_porc">Masa muscular (%)</label>
                            <input type="number" id="masa_muscular_porc" name="masa_muscular_porc" class="form-control" 
                                   placeholder="45" min="0" max="100" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="masa_grasa_porc">Masa grasa (%)</label>
                            <input type="number" id="masa_grasa_porc" name="masa_grasa_porc" class="form-control" 
                                   placeholder="12" min="0" max="100" step="0.1">
                        </div>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="masa_osea_kg">Masa ósea (kg)</label>
                            <input type="number" id="masa_osea_kg" name="masa_osea_kg" class="form-control" 
                                   placeholder="3.5" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="hidratacion_porc">Hidratación (%)</label>
                            <input type="number" id="hidratacion_porc" name="hidratacion_porc" class="form-control" 
                                   placeholder="55" min="0" max="100" step="0.1">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="annotaciones">Anotaciones</label>
                        <textarea id="annotaciones" name="annotaciones" class="form-control" rows="2" 
                                  placeholder="Observaciones..."></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;" id="submit-btn">
                            Guardar composición
                        </button>
                        <button type="button" class="btn btn-secondary" id="btn-cancel-edit" style="display: none;">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 class="mb-0">Registros guardados</h3>
                    <div style="display: flex; gap: 0.5rem;">
                        <select id="filter-nadador" class="form-control" style="width: auto;">
                            <option value="">Todos los nadadores</option>
                        </select>
                        <button type="button" class="btn btn-secondary" id="btn-load-records" style="font-size: 0.875rem;">
                            Cargar registros
                        </button>
                    </div>
                </div>
                <div id="records-list"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type === 'success' ? 'success' : 'error'}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function populateFormFields(data) {
            const fields = [
                'altura_cm', 'peso_kg', 'altura_sentado_cm', 'envergadura_cm',
                'longitud_pie_cm', 'longitud_mano_cm', 'distancia_biacromial_cm',
                'masa_muscular_porc', 'masa_grasa_porc', 'masa_osea_kg', 'hidratacion_porc',
                'annotaciones'
            ];
            fields.forEach(field => {
                const el = document.getElementById(field);
                if (el) el.value = data[field] || '';
            });
        }

        function clearForm() {
            document.getElementById('composicion-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('submit-btn').textContent = 'Guardar composición';
            document.getElementById('btn-cancel-edit').style.display = 'none';
            document.getElementById('fecha').valueAsDate = new Date();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.requireAuth()) return;

            const user = auth.getUser();
            if (user?.email) {
                document.getElementById('user-name').textContent = user.email;
            }

            document.getElementById('fecha').valueAsDate = new Date();
            document.getElementById('logout-btn').addEventListener('click', () => auth.logout());

            // Load swimmers for dropdowns
            const nadadorSelect = document.getElementById('nadador_id');
            const filterSelect = document.getElementById('filter-nadador');
            try {
                const response = await api.getNadadores();
                if (response.datos && response.datos.length > 0) {
                    response.datos.forEach(nadador => {
                        const option1 = document.createElement('option');
                        option1.value = nadador.id_seudonimo;
                        option1.textContent = `${nadador.nombre} (${nadador.id_seudonimo})`;
                        nadadorSelect.appendChild(option1);
                        
                        const option2 = document.createElement('option');
                        option2.value = nadador.id_seudonimo;
                        option2.textContent = `${nadador.nombre} (${nadador.id_seudonimo})`;
                        filterSelect.appendChild(option2);
                    });
                }
            } catch (error) {
                console.error('Error loading swimmers:', error);
                showAlert('Error cargando nadadores');
            }

            // Cancel edit button
            document.getElementById('btn-cancel-edit').addEventListener('click', () => {
                clearForm();
            });

            const form = document.getElementById('composicion-form');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const nadadorId = document.getElementById('nadador_id').value.trim();
                const fecha = document.getElementById('fecha').value;
                const editId = document.getElementById('edit-id').value;

                if (!nadadorId || !fecha) {
                    showAlert('Por favor, completa los campos obligatorios');
                    return;
                }

                const data = {
                    nadador_id: nadadorId,
                    fecha: fecha,
                    entrenador_id: user?.email || 'unknown'
                };

                const fields = [
                    'altura_cm', 'peso_kg', 'altura_sentado_cm', 'envergadura_cm',
                    'longitud_pie_cm', 'longitud_mano_cm', 'distancia_biacromial_cm',
                    'masa_muscular_porc', 'masa_grasa_porc', 'masa_osea_kg', 'hidratacion_porc'
                ];

                fields.forEach(field => {
                    const el = document.getElementById(field);
                    if (el && el.value.trim()) {
                        data[field] = parseFloat(el.value);
                    }
                });

                const annotaciones = document.getElementById('annotaciones').value.trim();
                if (annotaciones) data.annotaciones = annotaciones;

                setLoading(submitBtn, true);

                try {
                    if (editId) {
                        await api.updateComposicionCorporal(editId, data);
                        showAlert('Composición actualizada correctamente.', 'success');
                        clearForm();
                    } else {
                        await api.createComposicionCorporal(data);
                        showAlert('Composición corporal guardada correctamente.', 'success');
                        form.reset();
                        document.getElementById('fecha').valueAsDate = new Date();
                    }
                    document.getElementById('btn-load-records').click();
                } catch (error) {
                    showAlert(error.message);
                } finally {
                    setLoading(submitBtn, false);
                }
            });

            // Load records functionality
            document.getElementById('btn-load-records').addEventListener('click', async () => {
                const nadadorId = document.getElementById('filter-nadador').value;
                const params = {};
                if (nadadorId) params.nadador_id = nadadorId;

                try {
                    const response = await api.getComposicionCorporal(params);
                    renderRecordsList(response.datos || []);
                } catch (error) {
                    showAlert('Error cargando registros: ' + error.message);
                }
            });

            function renderRecordsList(records) {
                const container = document.getElementById('records-list');
                if (!records || records.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No hay registros guardados.</p>';
                    return;
                }

                container.innerHTML = `<table class="table" style="font-size: 0.875rem;">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Nadador</th>
                            <th>Peso</th>
                            <th>Altura</th>
                            <th>Masa muscular</th>
                            <th>Masa grasa</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.map(r => `
                            <tr>
                                <td>${r.fecha}</td>
                                <td>${r.nadador_id}</td>
                                <td>${r.peso_kg ? r.peso_kg + ' kg' : '-'}</td>
                                <td>${r.altura_cm ? r.altura_cm + ' cm' : '-'}</td>
                                <td>${r.masa_muscular_porc ? r.masa_muscular_porc + '%' : '-'}</td>
                                <td>${r.masa_grasa_porc ? r.masa_grasa_porc + '%' : '-'}</td>
                                <td>
                                    <button class="btn btn-secondary btn-sm" onclick="editRecord('${r.id}')">Editar</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Eliminar</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
            }

            window.editRecord = async function(id) {
                try {
                    const response = await api.getComposicionCorporal({});
                    const allRecords = response.datos || [];
                    const found = allRecords.find(r => r.id === id);
                    if (found) {
                        document.getElementById('edit-id').value = found.id;
                        document.getElementById('nadador_id').value = found.nadador_id || '';
                        document.getElementById('fecha').value = found.fecha || '';
                        populateFormFields(found);
                        document.getElementById('submit-btn').textContent = 'Actualizar composición';
                        document.getElementById('btn-cancel-edit').style.display = 'block';
                        document.getElementById('composicion-form').scrollIntoView({ behavior: 'smooth' });
                        showAlert('Editando registro. Modifica los campos y guarda.', 'success');
                    }
                } catch (error) {
                    showAlert('Error al cargar registro: ' + error.message);
                }
            };

            window.deleteRecord = async function(id) {
                if (!confirm('¿Eliminar este registro?')) return;

                try {
                    await api.deleteComposicionCorporal(id);
                    showAlert('Registro eliminado', 'success');
                    document.getElementById('btn-load-records').click();
                } catch (error) {
                    showAlert('Error: ' + error.message);
                }
            };
        });
    </script>
</body>
</html>
