<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGRENE - Registrar entrenamiento</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">SIGRENE</a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="entrenamiento.html" class="nav-link active">Registrar</a>
                <a href="nadadores.html" class="nav-link">Nadadores</a>
                <a href="control-fisiologico.html" class="nav-link">Controles</a>
                <a href="composicion-corporal.html" class="nav-link">Composición</a>
                <a href="analisis-competicion.html" class="nav-link">Competición</a>
            </nav>
            <div class="user-menu">
                <span class="user-name" id="user-name">Usuario</span>
                <button class="btn btn-danger btn-sm" id="logout-btn">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container container-md">
            <h1 class="page-title">Registrar entrenamiento</h1>
            
            <div id="alert-container"></div>
            
            <div class="card">
                <form id="entrenamiento-form">
                    <h3 class="mb-2">Datos del entrenamiento</h3>
                    
                    <div class="grid grid-3">
                        <div class="form-group">
                            <label for="nadador_id">Nadador</label>
                            <select id="nadador_id" name="nadador_id" class="form-control" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" name="fecha" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="hora">Hora</label>
                            <input type="time" id="hora" name="hora" class="form-control" 
                                   value="08:00">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <button type="button" class="btn btn-secondary" id="btn-copy-last" style="font-size: 0.875rem;">
                            ↻ Copiar último registro
                        </button>
                    </div>
                    
                    <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                    
                    <h3 class="mb-2">Tipo de entrenamiento</h3>
                    
                    <div class="grid grid-2" style="margin-bottom: 1.5rem;">
                        <div class="form-group">
                            <label for="lugar">Lugar</label>
                            <select id="lugar" name="lugar" class="form-control" required>
                                <option value="agua">Agua</option>
                                <option value="seco">Seco</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="tiempo_sesion_minutos">Duración (minutos)</label>
                            <input type="number" id="tiempo_sesion_minutos" name="tiempo_sesion_minutos" class="form-control" 
                                   placeholder="90" min="1" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="rpe">RPE (1-10)</label>
                        <input type="range" id="rpe" name="rpe" class="form-control-range" 
                               min="1" max="10" value="5" step="0.5"
                               oninput="document.getElementById('rpe-value').textContent = this.value">
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary);">
                            <span>1</span>
                            <span style="font-weight: 600; color: var(--primary);">RPE: <span id="rpe-value">5</span></span>
                            <span>10</span>
                        </div>
                    </div>

                    <!-- Water training fields -->
                    <div id="fields-agua">
                        <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                        
                        <div class="form-group">
                            <label for="volumen_metros">Volumen (metros)</label>
                            <input type="number" id="volumen_metros" name="volumen_metros" class="form-control" 
                                   placeholder="5000" min="0">
                        </div>
                        
                        <h4 class="mb-2" style="font-size: 1rem; color: var(--text-secondary);">Volumen por estilo (metros)</h4>
                        
                        <div class="grid grid-3">
                            <div class="form-group">
                                <label for="estilo_libre">Libre / Crol</label>
                                <input type="number" id="estilo_libre" name="estilo_libre" class="form-control" 
                                       placeholder="0" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="estilo_espalda">Espalda</label>
                                <input type="number" id="estilo_espalda" name="estilo_espalda" class="form-control" 
                                       placeholder="0" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="estilo_braza">Braza</label>
                                <input type="number" id="estilo_braza" name="estilo_braza" class="form-control" 
                                       placeholder="0" min="0" value="0">
                            </div>
                        </div>
                        
                        <div class="grid grid-2">
                            <div class="form-group">
                                <label for="estilo_mariposa">Mariposa</label>
                                <input type="number" id="estilo_mariposa" name="estilo_mariposa" class="form-control" 
                                       placeholder="0" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="estilo_combinado">Combinado / Medley</label>
                                <input type="number" id="estilo_combinado" name="estilo_combinado" class="form-control" 
                                       placeholder="0" min="0" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- Dry land training fields -->
                    <div id="fields-seco" style="display: none;">
                        <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                        
                        <div class="form-group">
                            <label for="ejercicio_principal">Ejercicio principal</label>
                            <input type="text" id="ejercicio_principal" name="ejercicio_principal" class="form-control" 
                                   placeholder="Ej: Sentadillas, Press de banca...">
                        </div>
                        
                        <div class="grid grid-3">
                            <div class="form-group">
                                <label for="series">Series</label>
                                <input type="number" id="series" name="series" class="form-control" 
                                       placeholder="4" min="0">
                            </div>
                            <div class="form-group">
                                <label for="repeticiones">Repeticiones</label>
                                <input type="number" id="repeticiones" name="repeticiones" class="form-control" 
                                       placeholder="8" min="0">
                            </div>
                            <div class="form-group">
                                <label for="peso_kg">Peso (kg)</label>
                                <input type="number" id="peso_kg" name="peso_kg" class="form-control" 
                                       placeholder="80" step="0.5">
                            </div>
                        </div>
                    </div>

                    <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                    
                    <h3 class="mb-2">Opciones adicionales</h3>
                    
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="fc_media">FC media (ppm)</label>
                            <input type="number" id="fc_media" name="fc_media" class="form-control" 
                                   placeholder="140" min="60" max="220">
                        </div>
                        <div class="form-group">
                            <label for="zona_intensidad">Zona intensidad (1-5)</label>
                            <select id="zona_intensidad" name="zona_intensidad" class="form-control">
                                <option value="">No especificada</option>
                                <option value="1">Zona 1 - Recuperación</option>
                                <option value="2">Zona 2 - Aeróbico</option>
                                <option value="3">Zona 3 - Tempo</option>
                                <option value="4">Zona 4 - Umbral</option>
                                <option value="5">Zona 5 - VO2max</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label for="tipo_entrenamiento">Tipo</label>
                            <select id="tipo_entrenamiento" name="tipo_entrenamiento" class="form-control">
                                <option value="">No especificado</option>
                                <option value="tecnica">Técnica</option>
                                <option value="resistencia">Resistencia</option>
                                <option value="velocidad">Velocidad</option>
                                <option value="fuerza">Fuerza</option>
                                <option value="recuperacion">Recuperación</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="esfuerzo_percibido">Estrés percibido (1-5)</label>
                            <input type="number" id="esfuerzo_percibido" name="esfuerzo_percibido" class="form-control" 
                                   placeholder="2" min="1" max="5">
                        </div>
                    </div>

                    <div class="grid grid-2" id="agua-extras">
                        <div class="form-group">
                            <label for="minutos_entrenamiento_agua">Minutos en agua</label>
                            <input type="number" id="minutos_entrenamiento_agua" name="minutos_entrenamiento_agua" class="form-control" 
                                   placeholder="90" min="0">
                        </div>
                        <div class="form-group">
                            <label for="sesion_fuerza">¿Sesión fuerza/potencia?</label>
                            <select id="sesion_fuerza" name="sesion_fuerza" class="form-control">
                                <option value="">No</option>
                                <option value="true">Sí</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-2" id="fuerza-extras" style="display: none;">
                        <div class="form-group">
                            <label for="duracion_fuerza_minutos">Duración fuerza (min)</label>
                            <input type="number" id="duracion_fuerza_minutos" name="duracion_fuerza_minutos" class="form-control" 
                                   placeholder="45" min="0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="video_tecnica_uri">Video de técnica (URI)</label>
                        <input type="text" id="video_tecnica_uri" name="video_tecnica_uri" class="form-control" 
                               placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label for="annotaciones">Anotaciones</label>
                        <textarea id="annotaciones" name="annotaciones" class="form-control" rows="2" 
                                  placeholder="Observaciones..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                        Guardar registro
                    </button>
                </form>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 class="mb-0">Registros recientes</h3>
                    <button type="button" class="btn btn-secondary" id="btn-load-records" style="font-size: 0.875rem;">
                        Cargar registros
                    </button>
                </div>
                <div id="records-list"></div>
            </div>

            <!-- Edit Modal -->
            <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
                <div class="card" style="max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
                    <h3 style="margin-bottom: 1.5rem;">Editar registro</h3>
                    <div id="edit-form-container"></div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <button type="button" class="btn btn-primary" id="btn-save-edit" style="flex: 1;">Guardar cambios</button>
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type === 'success' ? 'success' : 'error'}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function toggleFields() {
            const lugar = document.getElementById('lugar').value;
            const fieldsAgua = document.getElementById('fields-agua');
            const fieldsSeco = document.getElementById('fields-seco');
            const aguaExtras = document.getElementById('agua-extras');
            const fuerzaExtras = document.getElementById('fuerza-extras');
            const volumenInput = document.getElementById('volumen_metros');
            const tiempoInput = document.getElementById('tiempo_sesion_minutos');
            
            if (lugar === 'agua') {
                fieldsAgua.style.display = 'block';
                fieldsSeco.style.display = 'none';
                aguaExtras.style.display = 'flex';
                volumenInput.required = true;
            } else {
                fieldsAgua.style.display = 'none';
                fieldsSeco.style.display = 'block';
                aguaExtras.style.display = 'none';
                fuerzaExtras.style.display = 'flex';
                volumenInput.required = false;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.requireAuth()) return;

            const user = auth.getUser();
            if (user?.email) {
                document.getElementById('user-name').textContent = user.email;
            }

            document.getElementById('fecha').valueAsDate = new Date();
            document.getElementById('logout-btn').addEventListener('click', () => auth.logout());

            // Load swimmers for dropdown
            const nadadorSelect = document.getElementById('nadador_id');
            try {
                const response = await api.getNadadores();
                if (response.datos && response.datos.length > 0) {
                    response.datos.forEach(nadador => {
                        const option = document.createElement('option');
                        option.value = nadador.id_seudonimo;
                        option.textContent = `${nadador.nombre} (${nadador.id_seudonimo})`;
                        nadadorSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading swimmers:', error);
                showAlert('Error cargando nadadores. ¿Estás autenticado?');
            }

            // Initialize lugar toggle
            document.getElementById('lugar').addEventListener('change', toggleFields);
            toggleFields();

            // Copy from last record button
            document.getElementById('btn-copy-last').addEventListener('click', async () => {
                const nadadorId = document.getElementById('nadador_id').value;
                if (!nadadorId) {
                    showAlert('Selecciona primero un nadador');
                    return;
                }

                try {
                    const response = await api.getRegistrosByNadador(nadadorId, 0, 1);
                    if (response.registros && response.registros.length > 0) {
                        const last = response.registros[0];
                        const sesion = last.sesion_entrenamiento;
                        
                        if (sesion) {
                            // Reset form first to clear any old data
                            form.reset();
                            document.getElementById('fecha').valueAsDate = new Date();
                            
                            // Copy data from last session
                            if (last.fecha) document.getElementById('fecha').value = last.fecha;
                            if (sesion.hora) {
                                // Handle both old "manana/tarde/noche" format and new time format
                                const horaEl = document.getElementById('hora');
                                if (sesion.hora.match(/^\d{2}:\d{2}$/)) {
                                    horaEl.value = sesion.hora;
                                }
                            }
                            document.getElementById('lugar').value = sesion.lugar || 'agua';
                            document.getElementById('tiempo_sesion_minutos').value = sesion.tiempo_sesion_minutos || '';
                            document.getElementById('rpe').value = sesion.rpe || 5;
                            document.getElementById('rpe-value').textContent = sesion.rpe || 5;
                            document.getElementById('fc_media').value = sesion.fc_media || '';
                            document.getElementById('zona_intensidad').value = sesion.zona_intensidad || '';
                            document.getElementById('tipo_entrenamiento').value = sesion.tipo_entrenamiento || '';
                            document.getElementById('esfuerzo_percibido').value = sesion.esfuerzo_percibido || '';
                            document.getElementById('video_tecnica_uri').value = sesion.video_tecnica_uri || '';
                            document.getElementById('annotaciones').value = sesion.annotaciones || '';
                            
                            if (sesion.lugar === 'agua') {
                                document.getElementById('volumen_metros').value = sesion.volumen_metros || '';
                                document.getElementById('minutos_entrenamiento_agua').value = sesion.minutos_entrenamiento_agua || '';
                                document.getElementById('sesion_fuerza').value = sesion.sesion_fuerza ? 'true' : '';
                                document.getElementById('duracion_fuerza_minutos').value = sesion.duracion_fuerza_minutos || '';
                                
                                if (sesion.estilos) {
                                    document.getElementById('estilo_libre').value = sesion.estilos.libre || 0;
                                    document.getElementById('estilo_espalda').value = sesion.estilos.espalda || 0;
                                    document.getElementById('estilo_braza').value = sesion.estilos.braza || 0;
                                    document.getElementById('estilo_mariposa').value = sesion.estilos.mariposa || 0;
                                    document.getElementById('estilo_combinado').value = sesion.estilos.combinado || 0;
                                }
                            } else {
                                // seco (dry land)
                                document.getElementById('ejercicio_principal').value = sesion.ejercicio_principal || '';
                                document.getElementById('series').value = sesion.series || '';
                                document.getElementById('repeticiones').value = sesion.repeticiones || '';
                                document.getElementById('peso_kg').value = sesion.peso_kg || '';
                            }
                            
                            toggleFields();
                            showAlert('Datos copiados del último registro. Modifica los que necesites.', 'success');
                        }
                    } else {
                        showAlert('No hay registros previos para este nadador');
                    }
                } catch (error) {
                    showAlert('Error al obtener último registro: ' + error.message);
                }
            });

            // Form submission
            const form = document.getElementById('entrenamiento-form');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const nadadorId = document.getElementById('nadador_id').value;
                const fecha = document.getElementById('fecha').value;

                if (!nadadorId || !fecha) {
                    showAlert('Completa los campos obligatorios');
                    return;
                }

                const lugar = document.getElementById('lugar').value;
                const horaValue = document.getElementById('hora').value;
                const sesion = {
                    lugar: lugar,
                    hora: horaValue || null,
                    tiempo_sesion_minutos: parseInt(document.getElementById('tiempo_sesion_minutos').value),
                    rpe: parseInt(document.getElementById('rpe').value),
                    fc_media: parseInt(document.getElementById('fc_media').value) || null,
                    zona_intensidad: parseInt(document.getElementById('zona_intensidad').value) || null,
                    tipo_entrenamiento: document.getElementById('tipo_entrenamiento').value || null,
                    esfuerzo_percibido: parseInt(document.getElementById('esfuerzo_percibido').value) || null,
                    video_tecnica_uri: document.getElementById('video_tecnica_uri').value || null,
                    annotaciones: document.getElementById('annotaciones').value || null,
                    sesion_fuerza: document.getElementById('sesion_fuerza').value === 'true' ? true : null,
                    duracion_fuerza_minutos: parseInt(document.getElementById('duracion_fuerza_minutos').value) || null,
                    minutos_entrenamiento_agua: parseInt(document.getElementById('minutos_entrenamiento_agua').value) || null
                };

                if (lugar === 'agua') {
                    sesion.volumen_metros = parseInt(document.getElementById('volumen_metros').value) || 0;
                    
                    const estiloLibre = parseInt(document.getElementById('estilo_libre').value) || 0;
                    const estiloEspalda = parseInt(document.getElementById('estilo_espalda').value) || 0;
                    const estiloBraza = parseInt(document.getElementById('estilo_braza').value) || 0;
                    const estiloMariposa = parseInt(document.getElementById('estilo_mariposa').value) || 0;
                    const estiloCombinado = parseInt(document.getElementById('estilo_combinado').value) || 0;
                    
                    if (estiloLibre > 0 || estiloEspalda > 0 || estiloBraza > 0 || estiloMariposa > 0 || estiloCombinado > 0) {
                        sesion.estilos = {
                            libre: estiloLibre,
                            espalda: estiloEspalda,
                            braza: estiloBraza,
                            mariposa: estiloMariposa,
                            combinado: estiloCombinado,
                            otros: 0
                        };
                    } else {
                        sesion.estilos = {
                            libre: sesion.volumen_metros,
                            espalda: 0,
                            braza: 0,
                            mariposa: 0,
                            combinado: 0,
                            otros: 0
                        };
                    }
                } else {
                    sesion.ejercicio_principal = document.getElementById('ejercicio_principal').value || null;
                    sesion.series = parseInt(document.getElementById('series').value) || null;
                    sesion.repeticiones = parseInt(document.getElementById('repeticiones').value) || null;
                    sesion.peso_kg = parseFloat(document.getElementById('peso_kg').value) || null;
                }

                const data = {
                    nadador_id: nadadorId,
                    fecha: fecha,
                    entrenador_id: user?.email || 'unknown',
                    sesion_entrenamiento: sesion
                };

                setLoading(submitBtn, true);

                try {
                    const result = await api.createRegistro(data);
                    
                    let alertMsg = 'Registro guardado correctamente.';
                    if (result.calculos_aplicados) {
                        const c = result.calculos_aplicados;
                        alertMsg += ` sRPE: ${c.srpe || '-'}, Densidad: ${c.densidad?.toFixed(1) || '-'}`;
                        if (c.trimp) alertMsg += `, TRIMP: ${c.trimp}`;
                    }
                    showAlert(alertMsg, 'success');
                    
                    form.reset();
                    document.getElementById('fecha').valueAsDate = new Date();
                    document.getElementById('rpe').value = 5;
                    document.getElementById('rpe-value').textContent = '5';
                    document.getElementById('lugar').value = 'agua';
                    toggleFields();
                } catch (error) {
                    showAlert(error.message);
                } finally {
                    setLoading(submitBtn, false);
                }
            });

            // Load records functionality
            let currentEditId = null;
            let currentRecords = [];

            document.getElementById('btn-load-records').addEventListener('click', async () => {
                const nadadorId = document.getElementById('nadador_id').value;
                if (!nadadorId) {
                    showAlert('Selecciona primero un nadador');
                    return;
                }

                try {
                    const response = await api.getRegistrosByNadador(nadadorId, 0, 20);
                    currentRecords = response.registros || [];
                    renderRecordsList(currentRecords);
                } catch (error) {
                    showAlert('Error cargando registros: ' + error.message);
                }
            });

            function renderRecordsList(records) {
                const container = document.getElementById('records-list');
                if (!records || records.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No hay registros para este nadador.</p>';
                    return;
                }

                container.innerHTML = `<table class="table" style="font-size: 0.875rem;">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Lugar</th>
                            <th>Duración</th>
                            <th>RPE</th>
                            <th>sRPE</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.map(r => {
                            const s = r.sesion_entrenamiento || {};
                            const horaDisplay = s.hora ? s.hora : '';
                            return `<tr>
                                <td>${r.fecha}${horaDisplay ? ' ' + horaDisplay : ''}</td>
                                <td>${s.lugar === 'agua' ? '🏊 Agua' : '🏋️ Seco'}</td>
                                <td>${s.tiempo_sesion_minutos || '-'} min</td>
                                <td>${s.rpe || '-'}</td>
                                <td>${r.calculos?.srpe || '-'}</td>
                                <td>
                                    <button class="btn btn-secondary btn-sm" onclick="editRecord('${r.id}')">Editar</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Eliminar</button>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
            }

            window.editRecord = async function(id) {
                const record = currentRecords.find(r => r.id === id);
                if (!record) return;

                currentEditId = id;
                const s = record.sesion_entrenamiento || {};

                // Reset form first
                form.reset();
                
                // Populate form with record data
                if (record.fecha) document.getElementById('fecha').value = record.fecha;
                
                // Handle time field
                if (s.hora) {
                    const horaEl = document.getElementById('hora');
                    if (s.hora.match(/^\d{2}:\d{2}$/)) {
                        horaEl.value = s.hora;
                    }
                }
                
                document.getElementById('lugar').value = s.lugar || 'agua';
                document.getElementById('tiempo_sesion_minutos').value = s.tiempo_sesion_minutos || '';
                document.getElementById('rpe').value = s.rpe || 5;
                document.getElementById('rpe-value').textContent = s.rpe || 5;
                document.getElementById('fc_media').value = s.fc_media || '';
                document.getElementById('zona_intensidad').value = s.zona_intensidad || '';
                document.getElementById('tipo_entrenamiento').value = s.tipo_entrenamiento || '';
                document.getElementById('esfuerzo_percibido').value = s.esfuerzo_percibido || '';
                document.getElementById('video_tecnica_uri').value = s.video_tecnica_uri || '';
                document.getElementById('annotaciones').value = s.annotaciones || '';

                if (s.lugar === 'agua') {
                    document.getElementById('volumen_metros').value = s.volumen_metros || '';
                    document.getElementById('minutos_entrenamiento_agua').value = s.minutos_entrenamiento_agua || '';
                    document.getElementById('sesion_fuerza').value = s.sesion_fuerza ? 'true' : '';
                    document.getElementById('duracion_fuerza_minutos').value = s.duracion_fuerza_minutos || '';
                    
                    if (s.estilos) {
                        document.getElementById('estilo_libre').value = s.estilos.libre || 0;
                        document.getElementById('estilo_espalda').value = s.estilos.espalda || 0;
                        document.getElementById('estilo_braza').value = s.estilos.braza || 0;
                        document.getElementById('estilo_mariposa').value = s.estilos.mariposa || 0;
                        document.getElementById('estilo_combinado').value = s.estilos.combinado || 0;
                    }
                } else {
                    // seco (dry land)
                    document.getElementById('ejercicio_principal').value = s.ejercicio_principal || '';
                    document.getElementById('series').value = s.series || '';
                    document.getElementById('repeticiones').value = s.repeticiones || '';
                    document.getElementById('peso_kg').value = s.peso_kg || '';
                }

                toggleFields();

                // Scroll to form
                document.getElementById('entrenamiento-form').scrollIntoView({ behavior: 'smooth' });
                showAlert('Editando registro. Modifica los campos y guarda.', 'success');
            };

            window.deleteRecord = async function(id) {
                if (!confirm('¿Eliminar este registro?')) return;

                try {
                    await api.deleteRegistro(id);
                    showAlert('Registro eliminado', 'success');
                    document.getElementById('btn-load-records').click();
                } catch (error) {
                    showAlert('Error: ' + error.message);
                }
            };

            function closeEditModal() {
                document.getElementById('edit-modal').style.display = 'none';
                currentEditId = null;
            }
        });
    </script>

    <style>
        .form-control-range {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
            margin: 1rem 0;
        }
        .form-control-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
    </style>
</body>
