<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGRENE - Nadadores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">SIGRENE</a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="entrenamiento.html" class="nav-link">Registrar</a>
                <a href="nadadores.html" class="nav-link active">Nadadores</a>
                <a href="control-fisiologico.html" class="nav-link">Controles</a>
                <a href="composicion-corporal.html" class="nav-link">Composición</a>
                <a href="analisis-competicion.html" class="nav-link">Competición</a>
            </nav>
            <div class="user-menu">
                <span class="user-name" id="user-name">Usuario</span>
                <button class="btn btn-danger btn-sm" id="logout-btn">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; padding: 0; border: none; box-shadow: none; background: transparent;">
                <h1 class="page-title">Nadadores</h1>
                <button class="btn btn-primary" onclick="showFormModal()">+ Nuevo nadador</button>
            </div>
            
            <div id="alert-container"></div>
            
            <div class="table-container" id="nadadores-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Club</th>
                            <th>Provincia</th>
                            <th>Fecha alta</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="nadadores-tbody">
                        <tr><td colspan="6" class="text-center" style="padding: 2rem;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for create/edit -->
    <div id="form-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <h3 id="modal-title" style="margin-bottom: 1.5rem;">Nuevo nadador</h3>
            
            <form id="nadador-form">
                <input type="hidden" id="edit-id" value="">
                
                <div class="form-group">
                    <label for="id_seudonimo">ID seudónimo *</label>
                    <input type="text" id="id_seudonimo" class="form-control" placeholder="Ej: N-001" required>
                </div>
                
                <div class="form-group">
                    <label for="nombre">Nombre completo *</label>
                    <input type="text" id="nombre" class="form-control" placeholder="María García López" required>
                </div>
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="fecha_nacimiento">Fecha nacimiento</label>
                        <input type="date" id="fecha_nacimiento" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="genero">Género</label>
                        <select id="genero" class="form-control">
                            <option value="">No especificado</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="club">Club</label>
                        <input type="text" id="club" class="form-control" placeholder="Club Natación">
                    </div>
                    <div class="form-group">
                        <label for="provincia">Provincia</label>
                        <input type="text" id="provincia" class="form-control" placeholder="Madrid">
                    </div>
                </div>
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="fecha_alta">Fecha alta</label>
                        <input type="date" id="fecha_alta" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="entrenador_principal">Entrenador principal</label>
                        <input type="text" id="entrenador_principal" class="form-control" placeholder="email@ejemplo.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="telefono_emergencia">Teléfono emergencia</label>
                    <input type="tel" id="telefono_emergencia" class="form-control" placeholder="+34 600 000 000">
                </div>
                
                <div class="form-group">
                    <label for="observaciones">Observaciones</label>
                    <textarea id="observaciones" class="form-control" rows="2" placeholder="Notas adicionales..."></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="closeFormModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type === 'success' ? 'success' : 'error'}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function showFormModal(nadador = null) {
            const modal = document.getElementById('form-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('nadador-form');
            
            if (nadador) {
                title.textContent = 'Editar nadador';
                document.getElementById('edit-id').value = nadador.id_seudonimo;
                document.getElementById('id_seudonimo').value = nadador.id_seudonimo;
                document.getElementById('id_seudonimo').disabled = true;
                document.getElementById('nombre').value = nadador.nombre || '';
                document.getElementById('fecha_nacimiento').value = nadador.fecha_nacimiento || '';
                document.getElementById('genero').value = nadador.genero || '';
                document.getElementById('club').value = nadador.club || '';
                document.getElementById('provincia').value = nadador.provincia || '';
                document.getElementById('fecha_alta').value = nadador.fecha_alta || '';
                document.getElementById('entrenador_principal').value = nadador.entrenador_principal || '';
                document.getElementById('telefono_emergencia').value = nadador.telefono_emergencia || '';
                document.getElementById('observaciones').value = nadador.observaciones || '';
            } else {
                title.textContent = 'Nuevo nadador';
                form.reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('id_seudonimo').disabled = false;
            }
            
            modal.style.display = 'flex';
        }

        function closeFormModal() {
            document.getElementById('form-modal').style.display = 'none';
        }

        async function loadNadadores() {
            const tbody = document.getElementById('nadadores-tbody');
            
            try {
                const response = await api.getNadadores();
                
                if (!response.datos || response.datos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center" style="padding: 2rem;">No hay nadadores registrados. <a href="#" onclick="showFormModal(); return false;">Crear el primero</a></td></tr>';
                    return;
                }
                
                tbody.innerHTML = response.datos.map(nadador => `
                    <tr>
                        <td><strong>${nadador.id_seudonimo}</strong></td>
                        <td>${nadador.nombre}</td>
                        <td>${nadador.club || '-'}</td>
                        <td>${nadador.provincia || '-'}</td>
                        <td>${nadador.fecha_alta || '-'}</td>
                        <td>
                            <button class="btn btn-secondary btn-sm" onclick="editNadador('${nadador.id_seudonimo}')">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteNadador('${nadador.id_seudonimo}')">Eliminar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding: 2rem; color: var(--danger);">Error cargando nadadores: ${error.message}</td></tr>`;
            }
        }

        async function editNadador(id) {
            try {
                const nadador = await api.getNadador(id);
                showFormModal(nadador);
            } catch (error) {
                showAlert(error.message);
            }
        }

        async function deleteNadador(id) {
            if (!confirm(`¿Estás seguro de eliminar al nadador ${id}? Esta acción no se puede deshacer.`)) {
                return;
            }
            
            try {
                await api.deleteNadador(id);
                showAlert('Nadador eliminado correctamente', 'success');
                loadNadadores();
            } catch (error) {
                showAlert(error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.requireAuth()) return;

            const user = auth.getUser();
            if (user?.email) {
                document.getElementById('user-name').textContent = user.email;
            }

            document.getElementById('logout-btn').addEventListener('click', () => auth.logout());

            loadNadadores();

            document.getElementById('nadador-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const editId = document.getElementById('edit-id').value;
                const data = {
                    id_seudonimo: document.getElementById('id_seudonimo').value,
                    nombre: document.getElementById('nombre').value,
                    fecha_nacimiento: document.getElementById('fecha_nacimiento').value || null,
                    genero: document.getElementById('genero').value || null,
                    club: document.getElementById('club').value || null,
                    provincia: document.getElementById('provincia').value || null,
                    fecha_alta: document.getElementById('fecha_alta').value || null,
                    entrenador_principal: document.getElementById('entrenador_principal').value || null,
                    telefono_emergencia: document.getElementById('telefono_emergencia').value || null,
                    observaciones: document.getElementById('observaciones').value || null
                };

                try {
                    if (editId) {
                        await api.updateNadador(editId, data);
                        showAlert('Nadador actualizado correctamente', 'success');
                    } else {
                        await api.createNadador(data);
                        showAlert('Nadador creado correctamente', 'success');
                    }
                    closeFormModal();
                    loadNadadores();
                } catch (error) {
                    showAlert(error.message);
                }
            });

            // Close modal on background click
            document.getElementById('form-modal').addEventListener('click', (e) => {
                if (e.target.id === 'form-modal') {
                    closeFormModal();
                }
            });
        });
    </script>

    <style>
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
        }
        .btn-sm + .btn-sm {
            margin-left: 0.5rem;
        }
    </style>
</body>
</html>
