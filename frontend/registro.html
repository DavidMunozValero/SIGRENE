<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGRENE - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-card">
        <div class="card">
            <div class="logo">
                <h1>SIGRENE</h1>
                <p>Crea tu cuenta</p>
            </div>
            
            <div id="alert-container"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="nombre_completo">Nombre completo</label>
                    <input type="text" id="nombre_completo" name="nombre_completo" class="form-control" 
                           placeholder="Juan García López" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="tu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" 
                           placeholder="Repite la contraseña" required>
                </div>
                
                <div class="form-group">
                    <label for="rol">Rol en la plataforma</label>
                    <select id="rol" name="rol" class="form-control" required>
                        <option value="">Selecciona un rol</option>
                        <option value="entrenador">Entrenador</option>
                        <option value="medico">Médico/Preparador Físico</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="nadadores_asignados">Nadadores a cargo (opcional)</label>
                    <input type="text" id="nadadores_asignados" name="nadadores_asignados" class="form-control" 
                           placeholder="IDs separados por coma (ej: N-001, N-002)">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="register-btn">
                    Crear cuenta
                </button>
            </form>
            
            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (auth.redirectIfAuthenticated()) return;

            const form = document.getElementById('register-form');
            const registerBtn = document.getElementById('register-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const nombreCompleto = document.getElementById('nombre_completo').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                const rol = document.getElementById('rol').value;
                const nadadoresInput = document.getElementById('nadadores_asignados').value.trim();

                if (password !== confirmPassword) {
                    showAlert('Las contraseñas no coinciden');
                    return;
                }

                if (password.length < 8) {
                    showAlert('La contraseña debe tener al menos 8 caracteres');
                    return;
                }

                if (!rol) {
                    showAlert('Por favor, selecciona un rol');
                    return;
                }

                const nadadoresAsignados = nadadoresInput 
                    ? nadadoresInput.split(',').map(id => id.trim()).filter(id => id)
                    : [];

                setLoading(registerBtn, true);

                try {
                    await api.register({
                        email,
                        password,
                        nombre_completo: nombreCompleto,
                        rol,
                        nadadores_asignados: nadadoresAsignados
                    });
                    
                    showAlert('Cuenta creada correctamente. Ya puedes iniciar sesión.', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } catch (error) {
                    showAlert(error.message);
                } finally {
                    setLoading(registerBtn, false);
                }
            });
        });
    </script>
</body>
</html>
