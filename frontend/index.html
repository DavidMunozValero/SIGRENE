<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGRENE - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-card">
        <div class="card">
            <div class="logo">
                <h1>SIGRENE</h1>
                <p>Plataforma de Rendimiento del Nadador</p>
            </div>
            
            <div id="alert-container"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="tu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Tu contraseña" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    Iniciar sesión
                </button>
            </form>
            
            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
                <p class="mt-1"><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (auth.redirectIfAuthenticated()) return;

            const form = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showAlert('Por favor, completa todos los campos');
                    return;
                }

                setLoading(loginBtn, true);

                try {
                    const data = await api.login(email, password);
                    auth.login(data.access_token, { email });
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    showAlert(error.message);
                } finally {
                    setLoading(loginBtn, false);
                }
            });
        });
    </script>
</body>
</html>
